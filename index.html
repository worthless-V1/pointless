<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Photo Gallery</title>

<style>
body{
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    text-align:center;
}

h1{
    margin:20px 0;
}

.gallery{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:12px;
    max-width:900px;
    margin:auto;
}

.gallery img{
    width:100%;
    border-radius:12px;
    cursor:pointer;
}

.controls{
    margin:25px;
}

button{
    background:#111;
    color:white;
    border:1px solid white;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
    margin:0 10px;
}

button:disabled{
    opacity:0.4;
    cursor:not-allowed;
}

.viewer{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
}

.viewer img{
    max-width:95%;
    max-height:95%;
}

.pageNumber{
    margin-top:10px;
}
</style>
</head>

<body>

<h1>📷 My Gallery</h1>

<div class="gallery" id="gallery"></div>

<div class="controls">
    <button id="prevBtn">← Previous</button>
    <button id="nextBtn">Next →</button>

    <div class="pageNumber" id="pageNumber"></div>
</div>

<div class="viewer" id="viewer">
    <img id="fullImage">
</div>

<script>

// ADD YOUR PHOTOS HERE
const photos = [
    "photo1.jpg",
    "photo2.jpg",
    "photo3.jpg",
    "photo4.jpg",
    "photo5.jpg",
    "photo6.jpg",
    "photo7.jpg",
    "photo8.jpg",
    "photo9.jpg",
    "photo10.jpg"
];

const photosPerPage = 4;
let currentPage = 1;

function renderPage(){

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    const start = (currentPage - 1) * photosPerPage;
    const end = start + photosPerPage;

    photos.slice(start,end).forEach(photo => {

        const img = document.createElement("img");
        img.src = photo;

        img.onclick = () => {
            document.getElementById("viewer").style.display = "flex";
            document.getElementById("fullImage").src = photo;
        };

        gallery.appendChild(img);
    });

    const totalPages = Math.ceil(photos.length / photosPerPage);

    document.getElementById("pageNumber").innerText =
        `Page ${currentPage} of ${totalPages}`;

    document.getElementById("prevBtn").disabled =
        currentPage === 1;

    document.getElementById("nextBtn").disabled =
        currentPage === totalPages;
}

document.getElementById("prevBtn").onclick = () => {
    currentPage--;
    renderPage();
};

document.getElementById("nextBtn").onclick = () => {
    currentPage++;
    renderPage();
};

document.getElementById("viewer").onclick = () => {
    document.getElementById("viewer").style.display = "none";
};

renderPage();

</script>

</body>
</html>
